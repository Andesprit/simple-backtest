name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Build and validate the distributions to publish
        run: |
          uv build
          uvx twine check dist/*
          uv venv /tmp/simple-backtest-wheel
          uv pip install --python /tmp/simple-backtest-wheel/bin/python dist/*.whl
          /tmp/simple-backtest-wheel/bin/python -c "import simple_backtest; print(simple_backtest.__version__)"
      - name: Publish validated distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist/
